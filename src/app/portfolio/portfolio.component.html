<section class="section pointer" id="portfolio">
    <div class="container">
        <div class="row justify-content-center txt-bg txt-bg-portfolio">
            <div class="col-lg-6 pointer">
                <div class="wow fadeIn section-title text-center mb-4 pb-2">
                    <div class="mb-5 pb-3"><i class="far fa-clone h1 text-muted"></i></div>
                    <h2 class="h3 font-weight-bold">Recent Projects</h2>
                    <p class="text-muted mx-auto mb-0 mt-4 para-desc">Explore a selection of my development work demonstrating technical skills and creative problem-solving.</p>
                </div>
            </div>
        </div>

        <div class="row">
            <div *ngFor="let project of portfolioData.projects" 
                 class="col-lg-4 col-md-6 mb-5 wow {{project.animationClass}}" 
                 [attr.data-wow-delay]="project.delay">
                <div class="card project-card">
                    <div class="project-img-container">
                        <img src="assets/images/portfolio/{{project.image}}" 
                             class="card-img-top project-img" 
                             alt="{{project.project}}"
                             onerror="this.src='assets/images/portfolio/Dummy_Mern.webp'">
                    </div>
                    <div class="card-body">
                        <h4 class="font-weight-bold">{{project.project}}</h4>
                        <p class="description">{{project.description}}</p>
                        
                        <div class="tech-stack">
                            <span *ngFor="let tech of project.techStack" class="badge-tech">{{tech}}</span>
                        </div>

                        <div class="project-links">
                            <a [href]="project.live" target="_blank" class="link-item">
                                <i class="fas fa-external-link-alt"></i> <span>Live Demo</span> <i class="fas fa-arrow-right ml-1 small"></i>
                            </a>
                            <a [href]="project.github" target="_blank" class="link-item">
                                <i class="fab fa-github"></i> <span>Source Code</span>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
